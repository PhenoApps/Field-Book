options:
  bundleIdPrefix: com.fieldbook

name: iosApp

settings:
  CODE_SIGNING_ALLOWED: NO
  CODE_SIGNING_REQUIRED: NO
  CODE_SIGN_IDENTITY: ""

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    bundleId: com.fieldbook.iosApp
    info:
      path: Info.plist
      properties:
        CADisableMinimumFrameDurationOnPhone: true
    sources:
      - path: Sources
        glob: "**/*.swift"
      - path: ../shared/build/xcode/compose-resources
        type: folder
        buildPhase: resources
        name: compose-resources
        optional: true
    dependencies:
      - framework: ../shared/build/XCFrameworks/debug/sharedKit.xcframework
        embed: true
        codeSign: false
