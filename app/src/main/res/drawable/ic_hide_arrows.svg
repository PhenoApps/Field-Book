        stroke="#000000" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- pupil -->
  <circle cx="12" cy="12" r="1.2" fill="#000000"/>

  <!-- slash -->
  <path d="M9.4 14.6L14.6 9.4" stroke="#000000" stroke-width="1.8" stroke-linecap="round"/>
