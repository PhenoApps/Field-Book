<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Icon concept: "Hide field navigation arrows"
    - center: eye with a slash (hide)
    - sides: left/right chevrons (navigation arrows)
